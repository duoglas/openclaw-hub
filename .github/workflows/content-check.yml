name: Content Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build check
        run: pnpm build

      - name: Weekly review cadence check
        run: pnpm check:weekly-review

      - name: Weekly content quality check
        run: pnpm check:weekly-content

      - name: Weekly scorecard gate
        run: pnpm check:weekly-scorecard

      - name: Weekly external evidence gate
        run: pnpm check:weekly-external-evidence

      - name: Frontmatter date consistency check
        run: pnpm check:frontmatter-dates

      - name: Stale domain check
        run: pnpm check:stale-domain

      - name: Content taxonomy check
        run: pnpm check:taxonomy

      - name: Duplicate slug/id precheck
        run: pnpm check:duplicate-slug-id

      - name: Hreflang pair integrity check
        run: pnpm check:hreflang-pairs

      - name: Sitewide hreflang integrity check
        run: pnpm check:sitewide-hreflang

      - name: Canonical integrity check
        run: pnpm check:canonical-integrity

      - name: Daily CTA variant check
        run: pnpm check:daily-cta

      - name: Daily template regression check
        run: pnpm check:daily-template

      - name: Meta description quality check
        run: pnpm check:meta-description

      - name: Blog FAQ quality check
        run: pnpm check:blog-faq

      - name: Redirect rules check
        run: pnpm check:redirect-rules

      - name: Noindex leak check
        run: pnpm check:noindex-leak

      - name: RSS autodiscovery check
        run: pnpm check:rss-autodiscovery

      - name: Robots/sitemap integrity check
        run: pnpm check:robots-sitemap

      - name: Daily 2026-03-11 duplicate/source integrity check
        run: pnpm check:daily-0311

      - name: Daily heading date consistency check
        run: pnpm check:daily-heading-date

      - name: Fresh daily completeness check
        run: pnpm check:daily-fresh-completeness

      - name: Daily index growth check
        run: pnpm check:daily-index-growth

      - name: Latest daily surface alignment check
        run: pnpm check:latest-daily-surface

      - name: Daily related posts growth check
        run: pnpm check:daily-related-posts

      - name: Daily evidence matrix completeness check
        run: pnpm check:daily-evidence-matrix

      - name: Daily English language consistency check
        run: pnpm check:daily-en-language

      - name: Daily brief specificity check
        run: pnpm check:daily-brief-specificity

      - name: Publish daily generator fixture check
        run: pnpm check:publish-daily-generator-fixture

      - name: Daily generator real cron fixture check
        run: pnpm check:daily-generator-real-cron-fixture

      - name: Daily ZH generator real cron fixture check
        run: pnpm check:daily-zh-generator-real-cron-fixture

      - name: Daily bilingual generator pair fixture check
        run: pnpm check:daily-bilingual-generator-pair-fixture

      - name: Daily fixture source dedup check
        run: pnpm check:daily-fixture-source-dedup

      - name: Daily parser guardrail coverage check
        run: pnpm check:daily-parser-guardrail-coverage

      - name: Source projection rule scope check
        run: pnpm check:source-projection-rule-scope

      - name: Source projection rule diagnostic fixture check
        run: pnpm check:source-projection-rule-diagnostics

      - name: Source projection rule metadata coverage check
        run: pnpm check:source-projection-rule-metadata-coverage

      - name: Source projection rule quote normalization check
        run: pnpm check:source-projection-rule-quote-normalization

      - name: Source projection rule term narrowness check
        run: pnpm check:source-projection-rule-term-narrowness

      - name: Source projection rule registry health check
        run: pnpm check:source-projection-rule-registry-health

      - name: Source projection rule taxonomy check
        run: pnpm check:source-projection-rule-taxonomy

      - name: Daily action sections completeness check
        run: pnpm check:daily-action-sections

      - name: Social image absolute URL check
        run: pnpm check:social-image-absolute

      - name: WebSite schema integrity check
        run: pnpm check:website-schema

      - name: Tag case-collision check
        run: pnpm check:tag-case

      - name: Tag surface compactness check
        run: pnpm check:tag-surface-compactness

      - name: Tag canonical alias check
        run: pnpm check:tag-canonical-aliases

      - name: Tag semantic alias registry check
        run: pnpm check:tag-semantic-aliases

      - name: Frontmatter and content sanity check
        run: |
          echo "Checking frontmatter + content sanity..."
          while IFS= read -r f; do
            if ! grep -q "^---" "$f" 2>/dev/null; then
              echo "Missing frontmatter: $f"
              exit 1
            fi
            if ! grep -q "title:" "$f" || ! grep -q "description:" "$f" || ! grep -q "pubDate:" "$f"; then
              echo "Missing required frontmatter fields: $f"
              exit 1
            fi

            # Block obvious unfinished placeholders
            if grep -qE "^\-\s*$" "$f"; then
              echo "Found empty bullet placeholder: $f"
              exit 1
            fi
            if grep -qE "(Key launch / product update:|Most-read troubleshooting topic:|Most practical workflow tip:|关键发布 / 更新：|阅读量最高的排障话题：|最实用的效率技巧：)" "$f"; then
              echo "Found template placeholder text: $f"
              exit 1
            fi
          done < <(find src/content/blog -type f -name '*.md')
          echo "Frontmatter + content sanity check passed"

      - name: Lychee Link Check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress
            --base https://kuoo.uk
            --accept 200,204,206,301,302,307,308,400,401,403,429
            --exclude '127.0.0.1'
            --exclude 'm.do.co'
            --exclude 'vultr.com'
            --exclude 'reddit.com'
            --exclude 'raspberrypi.com'
            --exclude 'github.com/example/'
            --exclude 'github.com/nicepkg/openclaw'
            --exclude 'github\.com/duoglas/openclaw-hub/issues/new'
            --exclude 'clawhub.dev'
            --exclude 'shio.gov.cn'
            './dist/**/*.html'
          fail: true
